server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: station-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/station}
    username: ${DB_USERNAME:station}
    password: ${DB_PASSWORD:station}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: station-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: record

grpc:
  server:
    port: ${GRPC_PORT:9092}

app:
  kafka:
    topics:
      acquire-cabinet-lock: acquire-cabinet-lock-event
      acquire-cabinet-lock-result: acquire-cabinet-lock-result
      eject-powerbank: eject-powerbank-event
      eject-powerbank-result: eject-powerbank-result
      return-powerbank-command: return-powerbank-command
  station:
    lock-sim-delay-ms: 500   # simulated async delay for cabinet lock
    eject-sim-delay-ms: 800  # simulated async delay for powerbank ejection
    failure-rate: 0.05        # 5% random failure rate for realism

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.powerbank: DEBUG
