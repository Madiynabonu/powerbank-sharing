name: CD

# Faqat qo'lda ishga tushiriladi (workflow_dispatch)
# yoki v* tag push qilinganda (masalan: v1.0.0)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - payment-service
          - rental-service
          - station-service

    permissions:
      contents: read
      packages: write   # GHCR ga push qilish uchun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./mvnw package -q -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.ref_name }}

  # -------------------------------------------------------
  # DEPLOY — hozircha o'chirib qo'yilgan (disabled: true)
  # Serverga deploy qilmoqchi bo'lganda shu blokni oching
  # va secrets ga SERVER_HOST, SERVER_USER, SSH_KEY qo'shing
  # -------------------------------------------------------
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false   # <-- shu qatorni o'chiring deploy kerak bo'lganda

    steps:
      - name: SSH into server and pull new images
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/powerbank-sharing
            docker compose pull
            docker compose up -d --remove-orphans
