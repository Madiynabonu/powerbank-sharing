databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: madina
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: phone
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: keycloak_id
                  type: varchar(60)
              - column:
                  name: name
                  type: varchar(200)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: users
            columnNames: phone
            constraintName: uq_users_phone
        - createIndex:
            tableName: users
            indexName: idx_users_phone
            columns:
              - column: { name: phone }

  - changeSet:
      id: 001-create-otp-codes
      author: madina
      changes:
        - createTable:
            tableName: otp_codes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: phone
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: otp_codes
            indexName: idx_otp_phone_expires
            columns:
              - column: { name: phone }
              - column: { name: expires_at }
              - column: { name: used }
