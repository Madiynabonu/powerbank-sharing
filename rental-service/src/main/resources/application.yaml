server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: rental-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rental}
    username: ${DB_USERNAME:rental}
    password: ${DB_PASSWORD:rental}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never   # Liquibase owns all schema changes
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: qrtz_

grpc:
  server:
    port: ${GRPC_PORT:9091}

app:
  kafka:
    topics:
      acquire-cabinet-lock: acquire-cabinet-lock-event
      acquire-cabinet-lock-result: acquire-cabinet-lock-result
      eject-powerbank: eject-powerbank-event
      eject-powerbank-result: eject-powerbank-result
      payment-request: payment-request
      payment-result: payment-result
      cancel-payment-command: cancel-payment-command
      return-powerbank-command: return-powerbank-command
  rental:
    recurrent-charge-amount: 1000  # UZS per interval
    recurrent-interval-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.powerbank: DEBUG
