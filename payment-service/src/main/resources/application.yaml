server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD:payment}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        jakarta:
          persistence:
            lock:
              timeout: 5000
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

app:
  kafka:
    topics:
      payment-request: payment-request
      payment-result: payment-result
      payment-events: payment-events
      card-command: card-command
      cancel-payment-command: cancel-payment-command

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.powerbank: DEBUG
