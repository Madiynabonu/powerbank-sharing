databaseChangeLog:
  # Demo cards so the rental flow is runnable end-to-end without a real PSP.
  # In real life "bind card" would tokenize a PAN via an acquirer; here we
  # pre-seed Card rows and also expose a card-command Kafka topic for binding.
  - changeSet:
      id: 002-seed-demo-cards
      author: madina
      changes:
        - insert:
            tableName: cards
            columns:
              - column: { name: id, value: "11111111-1111-1111-1111-111111111111" }
              - column: { name: user_id, value: "00000000-0000-0000-0000-000000000001" }
              - column: { name: masked_pan, value: "8600 **** **** 1111" }
              - column: { name: balance, valueNumeric: 500000.00 }
              - column: { name: currency, value: "UZS" }
              - column: { name: status, value: "ACTIVE" }
              - column: { name: version, valueNumeric: 0 }
        - insert:
            tableName: cards
            columns:
              - column: { name: id, value: "22222222-2222-2222-2222-222222222222" }
              - column: { name: user_id, value: "00000000-0000-0000-0000-000000000002" }
              - column: { name: masked_pan, value: "8600 **** **** 2222" }
              - column: { name: balance, valueNumeric: 1000.00 }
              - column: { name: currency, value: "UZS" }
              - column: { name: status, value: "ACTIVE" }
              - column: { name: version, valueNumeric: 0 }
