databaseChangeLog:
  - changeSet:
      id: 001-create-cards
      author: madina
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: masked_pan
                  type: varchar(19)
                  constraints:
                    nullable: false
              # money is NUMERIC, never floating point — see DECISIONS.md
              - column:
                  name: balance
                  type: numeric(19, 2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  defaultValue: UZS
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: cards
            indexName: idx_cards_user_id
            columns:
              - column:
                  name: user_id
  - changeSet:
      id: 001-create-payments
      author: madina
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: card_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: rental_id
                  type: uuid
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: amount
                  type: numeric(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  defaultValue: UZS
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: failure_reason
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        # idempotency_key is UNIQUE — the DB is the source of truth for dedup,
        # the unique violation is caught in code (see PaymentService).
        - addUniqueConstraint:
            tableName: payments
            columnNames: idempotency_key
            constraintName: uq_payments_idempotency_key
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_payments_card
        - createIndex:
            tableName: payments
            indexName: idx_payments_card_id
            columns:
              - column:
                  name: card_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_rental_id
            columns:
              - column:
                  name: rental_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_user_id
            columns:
              - column:
                  name: user_id
